<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spring E-commerce</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >
</head>
<body>
<header class="container">
    <nav>
        <ul>
            <li><strong><a href="/">Home</a></strong></li>
        </ul>
        <ul>
            <li><a href="/add/product">add product</a></li>
        </ul>
    </nav>
</header>
<main class="container">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>ImageURL</th>
            <th>actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product: ${products}">
            <td id="product-id" th:value="${product.id}" th:text="${product.id}"/>
            <td th:text="${product.name}"/>
            <td th:text="${product.price}"/>
            <td th:text="${product.imageUrl}"/>
            <td>
                <a th:href="@{update/product/{id}(id=${product.id})}">edit</a>
                <button type="button"
                        class="delete-button"
                        th:data-id="${product.id}">
                    Delete
                </button>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
<script>
    document.querySelectorAll(".delete-button").forEach(button => {
        button.addEventListener("click", async (event) => {
            const id = event.target.getAttribute("data-id");
            if (!confirm(`Are you sure you want to delete product ${id}?`)) return;
            try {
                const response = await fetch(`/api/products/${id}`, {
                    method: "DELETE"
                });
                if (response.ok) {
                    // alert(`Product ${id} deleted`);
                    // Remove the row from the table or reload page:
                    // event.target.closest("tr").remove();
                    window.location.reload();
                } else {
                    alert("Failed to delete product. Status: " + response.status);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("An error occurred while deleting the product.");
            }
        });
    });
</script>
</html>
