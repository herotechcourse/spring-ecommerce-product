<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Products</title>
</head>
<body>
<button type="button" onclick="alert('Hello world!')">Add new product</button>
<button type="button" onclick="alert('Hello world!')">Update product by ID</button>
<button type="button" onclick="alert('Hello world!')">Delete product</button>

<form action="/products" method="post">
    <h2>Add a new product</h2>
    <p>
        <label for="name">Name (required):</label>
        <input type="text" name="name" id="name" required />
    </p>
    <p>
        <label for="price">Price (required):</label>
        <input type="number" name="price" id="price" required />
    </p>
    <p>
        <label for="imageUrl">URL (required):</label>
        <input type="url" name="imageUrl" id="imageUrl" required />
    </p>
    <p>
        <button type="submit" onclick="alert('Adding new product')">Add</button>
    </p>
</form>

<form id="update">
    <h2>Update product</h2>
    <p>
        <label for="productID">ID: (required) </label>
        <input type="text" name="productID" id="productID" required />
    </p>
    <p>
        <label for="newName">Name:</label>
        <input type="text" name="newName" id="newName" />
    </p>
    <p>
        <label for="newPrice">Price:</label>
        <input type="number" name="newPrice" id="newPrice" />
    </p>
    <p>
        <label for="newImageUrl">URL:</label>
        <input type="url" name="newImageUrl" id="newImageUrl" />
    </p>
    <p>
        <button type="submit">Update</button>
    </p>
</form>

<script>
    document.getElementById('update').addEventListener('submit', function(e) {
        e.preventDefault();

        const form = e.target;
        const formData = new FormData(form);
        const productID = formData.get('productID');

        formData.delete('productID');

        fetch(`/products/${productID}`, {
            method: 'PUT',
            body: JSON.stringify(Object.fromEntries(formData)),
            headers: {
                'Content-Type': 'application/json'
            }
        }).then(response => {
            if (response.ok) {
                alert('Product updated successfully!');
            } else {
                alert('Failed to update product.');
            }
        });
    });
</script>

<form id="delete">
    <h2>Delete product</h2>
    <p>
        <label for="deleteProductID">ID: (required) </label>
        <input type="text" name="deleteProductID" id="deleteProductID" required />
    </p>
    <p>
        <button type="submit">Delete</button>
    </p>
</form>

<script>
    document.getElementById('delete').addEventListener('submit', function(e) {
        e.preventDefault();

        const form = e.target;
        const formData = new FormData(form);
        const productID = formData.get('deleteProductID');

        fetch(`/products/${productID}`, {
            method: 'DELETE'
        }).then(response => {
            if (response.ok) {
                alert('Product deleted successfully!');
            } else {
                alert('Failed to delete product.');
            }
        }).catch(error => {
            console.error('Error:', error);
            alert('An error occurred while trying to delete the product.');
        });
    });
</script>


</body>
</html>
