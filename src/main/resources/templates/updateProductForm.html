<!DOCTYPE html>
<html>
<head>
    <title>Spring E-commerce</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >
</head>
<body>
<header class="container">
    <nav>
        <ul>
            <li><strong><a href="/">Home</a></strong></li>
        </ul>
        <ul>
            <li><a href="/add/product">Add Product</a></li>
        </ul>
    </nav>
</header>
<main class="container">
    <h1>Edit Product</h1>
    <!-- Hidden input to store the product ID -->
    <input type="hidden" id="product-id" />
    <!-- Product edit form -->
    <form id="product-form">
        <fieldset>
            <label>
                Name
                <input type="text" id="name" name="name" required />
            </label>
            <label>
                Price
                <input type="number" id="price" name="price" step="0.01" required />
            </label>
            <label>
                Image URL
                <input type="url" id="imageUrl" name="imageUrl" required />
            </label>
        </fieldset>
        <input type="submit" value="Update" />
    </form>
</main>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const pathParts = window.location.pathname.split("/");
        const id = pathParts[pathParts.length - 1];
        document.getElementById("product-id").value = id;
        try {
            const response = await fetch(`/api/products/${id}`);
            if (!response.ok) {
                alert("Failed to load product. Status: " + response.status);
                return;
            }
            const product = await response.json();
            document.getElementById("name").value = product.name;
            document.getElementById("price").value = product.price;
            document.getElementById("imageUrl").value = product.imageUrl;
        } catch (error) {
            console.error("Error fetching product:", error);
            alert("An error occurred while fetching the product.");
        }
    });

    document.getElementById("product-form").addEventListener("submit", async function (event) {
        event.preventDefault();
        const id = document.getElementById("product-id").value;
        const name = document.getElementById("name").value;
        const price = parseFloat(document.getElementById("price").value);
        const imageUrl = document.getElementById("imageUrl").value;
        const product = { name, price, imageUrl };
        try {
            const response = await fetch(`/api/products/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(product)
            });
            if (response.ok) {
                window.location.href = "/";
            } else {
                alert("Failed to update product. Status: " + response.status);
            }
        } catch (error) {
            console.error("Error updating product:", error);
            alert("An error occurred while updating the product.");
        }
    });
</script>
</body>
</html>
