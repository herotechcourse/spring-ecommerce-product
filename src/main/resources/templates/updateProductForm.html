<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Spring E-commerce</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >
</head>
<body>
<header class="container">
    <nav>
        <ul>
            <li><strong><a href="/admin/">Home</a></strong></li>
        </ul>
        <ul>
            <li><a href="/admin/add/product">Add Product</a></li>
        </ul>
    </nav>
</header>
<main class="container">
    <h1>Edit Product</h1>
    <!-- Product edit form -->
    <form id="product-form">
        <!-- Hidden input for ID -->
        <input type="hidden" id="product-id" th:value="${product.id}" />

        <fieldset>
            <label>
                Name
                <input type="text" id="name" name="name" th:value="${product.name}" />
            </label>
            <label>
                Price
                <input type="number" id="price" name="price" step="0.01" th:value="${product.price}" />
            </label>
            <label>
                Image URL
                <input type="url" id="imageUrl" name="imageUrl" th:value="${product.imageUrl}" />
            </label>
        </fieldset>
        <input type="submit" value="Update" />
    </form>
</main>

<script>
    document.getElementById("product-form").addEventListener("submit", async function (event) {
        event.preventDefault();
        const id = document.getElementById("product-id").value;

        const product = {};

        const name = document.getElementById("name").value.trim();
        if (name) product.name = name;

        const priceValue = document.getElementById("price").value;
        if (priceValue) product.price = parseFloat(priceValue);

        const imageUrl = document.getElementById("imageUrl").value.trim();
        if (imageUrl) product.imageUrl = imageUrl;

        if (Object.keys(product).length === 0) {
            alert("Please fill in at least one field to update.");
            return;
        }

        try {
            const response = await fetch(`/admin/api/products/${id}`, {
                method: "PATCH",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(product)
            });
            if (response.ok) {
                window.location.href = "/admin/";
            } else {
                alert("Failed to update product. Status: " + response.status);
            }
        } catch (error) {
            console.error("Error updating product:", error);
            alert("An error occurred while updating the product.");
        }
    });
</script>
</body>
</html>
