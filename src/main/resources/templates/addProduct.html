<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
</head>
<body>
<div class="container">
    <h1>Add Product</h1>

    <form action="#" th:action="@{/admin/products/add-product}" th:object="${product}" method="post">

        <label for="name">Product ID</label>
        <input type="text" id="id" th:field="*{id}" required>

        <label for="name">Product Name</label>
        <input type="text" id="name" th:field="*{name}" required>

        <label for="price">Price</label>
        <input type="number" id="price" th:field="*{price}" step="0.01" required>

        <label for="img">Image URL</label>
        <input type="url" id="img" th:field="*{img}" required>

        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" th:field="*{quantity}" required>

        <button type="submit">Add Product</button>
        <a th:href="@{/admin/products}" role="button" class="secondary">Cancel</a>

        <p th:if="${errorMessage}" class="error" th:text="${errorMessage}" style="color: red;"></p>
    </form>
</div>
</body>
</html>
